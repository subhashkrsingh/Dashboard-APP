services:
  - type: web
    name: power-sector-dashboard
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC_FRONTEND
        value: true
      - key: FRONTEND_ORIGIN
        value: ""
